  <body>
    <main class="shell content-page">
      <p class="eyebrow">Privacy</p>
      <h1>隐私说明</h1>
      <section>
        <p>当前 MVP 不要求用户登录，不读取 EVE Online 账号，不保存 EVE 账号密码，也不请求角色授权。</p>
        <p>推荐功能会把用户选择的玩法、船型、账号类型和预算发送到本站后端，用于请求 EVE Workbench 公开数据并生成推荐结果。</p>
        <p>反馈表单当前仅用于验证产品方向。正式上线运营时，应接入数据库并在此页面明确说明保存内容、用途、保留时间和删除方式。</p>
      </section>
      <footer class="site-footer">
        <a href="/">返回首页</a>

        <a href="/terms">条款</a>
      </footer>
    </main>
